
name: Build FreeProMemOS BETA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_VERSION: "6.8.12"
  DISTRO: "ubuntu"
  CODENAME: "jammy"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VERSION: "0.1.0-BETA"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          cpio \
          kmod \
          rsync \
          grub-pc-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          dosfstools \
          debootstrap \
          qemu-utils \
          ca-certificates
    
    - name: Download kernel source
      run: |
        cd "$HOME"
        wget --no-verbose --tries=3 https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
        tar xf linux-${KERNEL_VERSION}.tar.xz
        ls -la linux-${KERNEL_VERSION}
    
    - name: Configure kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make x86_64_defconfig
        make olddefconfig
    
    - name: Build kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make -j$(nproc) bzImage modules
        ls -lh arch/x86/boot/bzImage
    
    - name: Create Ubuntu base system
      run: |
        sudo mkdir -p /tmp/rootfs
        sudo debootstrap \
          --include=bash,wget,vim,coreutils,iproute2,iputils-ping,net-tools,ifupdown,procps,sysvinit-utils,util-linux,ncurses-bin,less,dpkg,apt \
          --variant=minbase \
          ${CODENAME} /tmp/rootfs http://archive.ubuntu.com/ubuntu/
        
        sudo chroot /tmp/rootfs bash -c "echo 'freepromemos' &gt; /etc/hostname"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.0.1 localhost' &gt; /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.1.1 freepromemos' &gt;&gt; /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "useradd -m -s /bin/bash user"
        sudo chroot /tmp/rootfs bash -c "echo 'root:root' | chpasswd"
        sudo chroot /tmp/rootfs bash -c "echo 'user:user' | chpasswd"
        
        sudo rm -f /tmp/init.sh
        sudo cat &gt; /tmp/init.sh &lt;&lt; 'INITEND'
#!/bin/bash
set -e
mount -t proc proc /proc
mount -t sysfs sysfs /sys
mount -t devtmpfs devtmpfs /dev 2&gt;/dev/null || true
mount -t tmpfs tmpfs /tmp 2&gt;/dev/null || true
clear
echo ""
echo "=========================================="
echo "  FreeProMemOS BETA v0.1.0"
echo "=========================================="
echo ""
echo "Linux kernel $(uname -r)"
echo "System architecture: $(uname -m)"
echo ""
echo "Welcome to FreeProMemOS!"
echo ""
echo "This is a lightweight Debian-based system."
echo "Login as: root (password: root)"
echo "          user (password: user)"
echo ""
exec /bin/bash
INITEND
        
        sudo cp /tmp/init.sh /tmp/rootfs/init
        sudo chmod +x /tmp/rootfs/init
        
        sudo rm -rf /tmp/rootfs/var/cache/apt/archives/* 2&gt;/dev/null || true
        sudo rm -rf /tmp/rootfs/var/lib/apt/lists/* 2&gt;/dev/null || true
        
        ls -la /tmp/rootfs/
    
    - name: Create initramfs
      run: |
        mkdir -p /tmp/initramfs
        sudo cp -a /tmp/rootfs/* /tmp/initramfs/
        
        sudo chmod 755 /tmp/initramfs
        sudo chmod 755 /tmp/initramfs/dev /tmp/initramfs/proc /tmp/initramfs/sys /tmp/initramfs/tmp 2&gt;/dev/null || true
        
        cd /tmp/initramfs
        sudo find . -print0 | sudo cpio --null -o --format=newc | gzip -9 &gt; /tmp/initrd.img
        
        ls -lh /tmp/
    
    - name: Create boot directory
      run: |
        mkdir -p /tmp/iso/boot/grub/i386-pc
        cp "$HOME/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage" /tmp/iso/boot/vmlinuz
        cp "$HOME/linux-${KERNEL_VERSION}/System.map" /tmp/iso/boot/System.map
        cp /tmp/initrd.img /tmp/iso/boot/initrd.img
        ls -la /tmp/iso/boot/
    
    - name: Create GRUB configuration
      run: |
        sudo rm -f /tmp/iso/boot/grub/grub.cfg
        sudo cat &gt; /tmp/iso/boot/grub/grub.cfg &lt;&lt; 'GRUBEND'
set timeout=10
set default=0

menuentry "FreeProMemOS BETA v0.1.0" {
    linux /boot/vmlinuz root=/dev/ram0 rw init=/init
    initrd /boot/initrd.img
}

menuentry "FreeProMemOS BETA v0.1.0 (Safe Mode)" {
    linux /boot/vmlinuz root=/dev/ram0 rw init=/init single
    initrd /boot/initrd.img
}
GRUBEND
        
        ls -la /tmp/iso/boot/grub/
    
    - name: Create ISO image
      run: |
        cd /tmp
        ls -la iso/
        grub-mkrescue -o FreeProMemOS-BETA-${VERSION}.iso /tmp/iso
        ls -lh FreeProMemOS-BETA-${VERSION}.iso
        file FreeProMemOS-BETA-${VERSION}.iso
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-BETA-${VERSION}-ISO
        path: /tmp/FreeProMemOS-BETA-${VERSION}.iso
        retention-days: 30
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-BETA-${VERSION}-Kernel
        path: |
          /home/runner/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage
          /home/runner/linux-${KERNEL_VERSION}/System.map
          /home/runner/linux-${KERNEL_VERSION}/.config
        retention-days: 30
