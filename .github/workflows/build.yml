    - name: Build Kernel (single thread for stability)
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        echo "Starting kernel build..."
        make bzImage -j2 2>&1 | tail -100
    
    - name: Build Kernel Modules
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        echo "Building modules..."
        make modules -j2 2>&1 | tail -50
        make modules_install INSTALL_MOD_PATH=${{ github.workspace }}/build/modules
    
    - name: Create Initial RAM Disk
      run: |
        cd ${{ github.workspace }}
        
        # Create a simple initramfs directory
        mkdir -p initramfs/{bin,sbin,etc,proc,sys,dev,root,tmp}
        
        # Download pre-built busybox
        wget -q https://busybox.net/downloads/binaries/1.36.1-x86_64-linux-musl/busybox
        cp busybox initramfs/bin/
        chmod +x initramfs/bin/busybox
        
        # Create symlinks for busybox utilities
        cd initramfs/bin
        for cmd in $(./busybox --list); do
            ln -sf busybox $cmd 2>/dev/null || true
        done
        
        # Create init script
        cd ${{ github.workspace }}
        cat > initramfs/init << 'EOF'
        #!/bin/busybox sh
        
        # Mount filesystems
        mount -t proc none /proc
        mount -t sysfs none /sys
        mount -t devtmpfs none /dev
        
        # Create device nodes
        mknod /dev/null c 1 3 2>/dev/null || true
        mknod /dev/zero c 1 5 2>/dev/null || true
        mknod /dev/tty c 5 0 2>/dev/null || true
        mknod /dev/console c 5 1 2>/dev/null || true
        
        # Set hostname
        hostname FreeProMemOS
        
        # Welcome message
        echo ""
        echo "FreeProMemOS"
        echo "============"
        echo ""
        echo "Kernel: $(uname -r)"
        echo "Architecture: $(uname -m)"
        echo ""
        echo "Welcome to FreeProMemOS - A lightweight, Debian-compatible Linux distribution"
        echo ""
        
        # Start shell
        exec /bin/sh
        EOF
        chmod +x initramfs/init
        
        # Pack initramfs
        cd initramfs
        find . | cpio -o -H newc | gzip > ../iso/boot/initrd.img
        ls -lh ../iso/boot/initrd.img
    
    - name: Build ISO Image
      run: |
        cd ${{ github.workspace }}
        
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        
        cp linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz
        cp linux-${{ env.LINUX_VERSION }}/System.map iso/boot/kernel/System.map
        
        cat > iso/boot/grub/grub.cfg << 'EOF'
        set timeout=5
        set default=0
        
        menuentry 'FreeProMemOS' {
            linux /boot/kernel/vmlinuz root=/dev/ram0 rw console=ttyS0 console=tty0
            initrd /boot/initrd.img
        }
        
        menuentry 'FreeProMemOS (Safe Mode)' {
            linux /boot/kernel/vmlinuz root=/dev/ram0 rw console=ttyS0 console=tty0 single
            initrd /boot/initrd.img
        }
        EOF
        
        cd iso
        grub-mkrescue -o FreeProMemOS.iso .
        ls -lh FreeProMemOS.iso
    
    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-x86_64
        path: iso/FreeProMemOS.iso
    
    - name: Upload Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-kernel-${{ env.LINUX_VERSION }}
        path: |
          linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage
          linux-${{ env.LINUX_VERSION }}/System.map

  release:
    needs: build-kernel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: FreeProMemOS-x86_64
        path: release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.iso
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
