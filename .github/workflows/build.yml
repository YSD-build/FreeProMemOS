
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_VERSION: "6.8.12"
  DISTRO: "ubuntu"
  CODENAME: "jammy"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          cpio \
          kmod \
          rsync \
          grub-pc-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          dosfstools \
          debootstrap \
          qemu-utils
    
    - name: Download kernel source
      run: |
        cd "$HOME"
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
        tar xf linux-${KERNEL_VERSION}.tar.xz
        ls -la linux-${KERNEL_VERSION}
    
    - name: Configure kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make x86_64_defconfig
        make olddefconfig
    
    - name: Build kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make -j$(nproc) bzImage modules
        ls -lh arch/x86/boot/bzImage
    
    - name: Install kernel modules
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        sudo make modules_install
        sudo depmod ${KERNEL_VERSION}
    
    - name: Create Debian base system
      run: |
        sudo mkdir -p /tmp/rootfs
        sudo debootstrap --include=bash,wget,vim,coreutils,iproute2,iputils-ping --variant=minbase ${CODENAME} /tmp/rootfs http://archive.ubuntu.com/ubuntu/
        sudo chroot /tmp/rootfs bash -c "echo 'freepromemos' > /etc/hostname"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.0.1 localhost' >> /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.1.1 freepromemos' >> /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "useradd -m -s /bin/bash user || true"
        sudo chroot /tmp/rootfs bash -c "echo 'root:root' | chpasswd || true"
        sudo chroot /tmp/rootfs bash -c "echo 'user:user' | chpasswd || true"
        
        printf '#!/bin/bash\nmount -t proc proc /proc\nmount -t sysfs sysfs /sys\nmount -t devtmpfs devtmpfs /dev 2>/dev/null || true\nmount -t tmpfs tmpfs /tmp 2>/dev/null || true\nclear\necho ""\necho "=========================================="\necho "  FreeProMemOS ${KERNEL_VERSION}"\necho "=========================================="\necho ""\necho "Linux kernel $(uname -r)"\necho "System architecture: $(uname -m)"\necho ""\necho "Welcome to FreeProMemOS!"\necho ""\necho "This is a lightweight Debian-based system."\necho "Login as: root (password: root)"\necho ""\nexec /bin/bash\n' > /tmp/init.sh
        
        sudo cp /tmp/init.sh /tmp/rootfs/init
        sudo chmod +x /tmp/rootfs/init
        
        sudo rm -rf /tmp/rootfs/var/cache/apt/archives/* 2>/dev/null || true
        sudo rm -rf /tmp/rootfs/var/lib/apt/lists/* 2>/dev/null || true
        
        ls -la /tmp/rootfs/
    
    - name: Create initramfs
      run: |
        mkdir -p /tmp/initramfs
        cp -r /tmp/rootfs/* /tmp/initramfs/
        
        chmod 755 /tmp/initramfs
        chmod 755 /tmp/initramfs/dev /tmp/initramfs/proc /tmp/initramfs/sys /tmp/initramfs/tmp 2>/dev/null || true
        
        cd /tmp/initramfs
        find . -print0 | cpio --null -o --format=newc | gzip -9 > /tmp/initrd.img
        
        ls -lh /tmp/
    
    - name: Create boot directory
      run: |
        mkdir -p /tmp/iso/boot/grub/i386-pc
        cp "$HOME/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage" /tmp/iso/boot/vmlinuz
        cp "$HOME/linux-${KERNEL_VERSION}/System.map" /tmp/iso/boot/System.map
        cp /tmp/initrd.img /tmp/iso/boot/initrd.img
        ls -la /tmp/iso/boot/
    
    - name: Create GRUB configuration
      run: |
        printf 'set timeout=10\nset default=0\n\nmenuentry "FreeProMemOS ${KERNEL_VERSION}" {\n    linux /boot/vmlinuz root=/dev/ram0 rw\n    initrd /boot/initrd.img\n}\n\nmenuentry "FreeProMemOS ${KERNEL_VERSION} (Safe Mode)" {\n    linux /boot/vmlinuz root=/dev/ram0 rw single\n    initrd /boot/initrd.img\n}\n' > /tmp/iso/boot/grub/grub.cfg
    
    - name: Create ISO image
      run: |
        cd /tmp
        ls -la iso/
        grub-mkrescue -o FreeProMemOS-${KERNEL_VERSION}.iso /tmp/iso
        ls -lh FreeProMemOS-${KERNEL_VERSION}.iso
        file FreeProMemOS-${KERNEL_VERSION}.iso
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO-${KERNEL_VERSION}
        path: /tmp/FreeProMemOS-${KERNEL_VERSION}.iso
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Kernel-${KERNEL_VERSION}
        path: |
          /root/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage
          /root/linux-${KERNEL_VERSION}/System.map
          /root/linux-${KERNEL_VERSION}/.config
