
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_VERSION: "6.8.12"
  DISTRO: "ubuntu"
  CODENAME: "jammy"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          cpio \
          kmod \
          rsync \
          grub-pc-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          dosfstools \
          debootstrap \
          qemu-utils
    
    - name: Download kernel source
      run: |
        cd /tmp
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
        tar xf linux-${KERNEL_VERSION}.tar.xz
        ls -la /tmp/linux-${KERNEL_VERSION}
    
    - name: Configure kernel
      run: |
        cd /tmp/linux-${KERNEL_VERSION}
        make x86_64_defconfig
        make olddefconfig
    
    - name: Build kernel
      run: |
        cd /tmp/linux-${KERNEL_VERSION}
        make -j$(nproc) bzImage modules
    
    - name: Install kernel modules
      run: |
        cd /tmp/linux-${KERNEL_VERSION}
        sudo make modules_install
        sudo depmod ${KERNEL_VERSION}
    
    - name: Create Debian base system
      run: |
        sudo mkdir -p /tmp/rootfs
        sudo debootstrap --include=bash,wget,vim,coreutils,iproute2,iputils-ping --variant=minbase ${CODENAME} /tmp/rootfs http://archive.ubuntu.com/ubuntu/
        sudo chroot /tmp/rootfs bash -c "echo 'freepromemos' > /etc/hostname"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.0.1 localhost' >> /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.1.1 freepromemos' >> /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "useradd -m -s /bin/bash user"
        sudo chroot /tmp/rootfs bash -c "echo 'root:root' | chpasswd"
        sudo chroot /tmp/rootfs bash -c "echo 'user:user' | chpasswd"
        
        # Create init script
        sudo tee /tmp/rootfs/init << 'INIT'
        #!/bin/bash

        # Mount filesystems
        mount -t proc none /proc
        mount -t sysfs none /sys
        mount -t devtmpfs none /dev 2>/dev/null
        mount -t tmpfs none /tmp 2>/dev/null

        # Welcome message
        clear
        echo ""
        echo "=========================================="
        echo "  FreeProMemOS ${KERNEL_VERSION}"
        echo "=========================================="
        echo ""
        echo "Linux kernel $(uname -r)"
        echo "System architecture: $(uname -m)"
        echo ""
        echo "Welcome to FreeProMemOS!"
        echo ""
        echo "This is a lightweight Debian-based system."
        echo ""
        echo "Available commands:"
        echo "  bash, ls, cd, cat, etc. (coreutils)"
        echo "  wget"
        echo "  vim"
        echo ""
        echo "Login as: root (password: root) or user (password: user)"
        echo ""

        # Start shell
        exec /bin/bash
        INIT
        
        sudo chmod +x /tmp/rootfs/init
        
        # Clean up some space
        sudo rm -rf /tmp/rootfs/var/cache/apt/archives/*
        sudo rm -rf /tmp/rootfs/var/lib/apt/lists/*
        
        ls -la /tmp/rootfs/
    
    - name: Create initramfs
      run: |
        cd /tmp/linux-${KERNEL_VERSION}
        sudo mkdir -p /tmp/initramfs
        sudo chmod 755 /tmp/initramfs
        
        # Copy everything from rootfs
        sudo cp -r /tmp/rootfs/* /tmp/initramfs/
        
        # Make sure it's bootable
        cd /tmp/initramfs
        sudo chmod 755 .
        sudo chmod 755 dev proc sys tmp
        
        # Create initramfs
        sudo find . -print0 | sudo cpio --null -o --format=newc | gzip -9 > /tmp/initrd.img
        
        ls -lh /tmp/
    
    - name: Create boot directory and copy kernel
      run: |
        sudo mkdir -p /tmp/iso/boot/grub/i386-pc
        sudo cp /tmp/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage /tmp/iso/boot/vmlinuz
        sudo cp /tmp/linux-${KERNEL_VERSION}/System.map /tmp/iso/boot/System.map
        sudo cp /tmp/initrd.img /tmp/iso/boot/initrd.img
        ls -la /tmp/iso/boot/
    
    - name: Create GRUB configuration
      run: |
        sudo tee /tmp/iso/boot/grub/grub.cfg << 'GRUB'
        set timeout=10
        set default=0

        menuentry "FreeProMemOS ${KERNEL_VERSION}" {
            linux /boot/vmlinuz root=/dev/ram0 rw
            initrd /boot/initrd.img
        }

        menuentry "FreeProMemOS ${KERNEL_VERSION} (Safe Mode)" {
            linux /boot/vmlinuz root=/dev/ram0 rw single
            initrd /boot/initrd.img
        }
        GRUB
    
    - name: Create ISO image
      run: |
        cd /tmp
        
        # Create a simple ISO using grub-mkrescue
        grub-mkrescue -o FreeProMemOS-${KERNEL_VERSION}.iso /tmp/iso 2>/dev/null || \
        grub-mkrescue -o FreeProMemOS-${KERNEL_VERSION}.iso /tmp/iso
        
        ls -lh FreeProMemOS-${KERNEL_VERSION}.iso
        file FreeProMemOS-${KERNEL_VERSION}.iso
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO-${KERNEL_VERSION}
        path: /tmp/FreeProMemOS-${KERNEL_VERSION}.iso
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Kernel-${KERNEL_VERSION}
        path: |
          /tmp/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage
          /tmp/linux-${KERNEL_VERSION}/System.map
          /tmp/linux-${KERNEL_VERSION}/.config
