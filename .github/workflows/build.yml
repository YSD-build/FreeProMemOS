
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev dwarves pahole zstd kmod cpio rsync wget xz-utils gzip bzip2 grub2-common grub-pc-bin grub-efi-amd64-bin xorriso parted dosfstools
    
    - name: Download Kernel
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-$LINUX_VERSION.tar.xz
        tar xf linux-$LINUX_VERSION.tar.xz
    
    - name: Configure Kernel
      run: |
        cd linux-$LINUX_VERSION
        make defconfig
    
    - name: Build Kernel
      run: |
        cd linux-$LINUX_VERSION
        make -j$(nproc) bzImage
    
    - name: Build Modules
      run: |
        cd linux-$LINUX_VERSION
        make -j$(nproc) modules
    
    - name: Install Modules
      run: |
        cd linux-$LINUX_VERSION
        sudo make modules_install
        sudo depmod
    
    - name: Create Initramfs
      run: |
        mkdir -p iso/boot
        wget -q https://busybox.net/downloads/binaries/1.36.1-x86_64-linux-musl/busybox
        chmod +x busybox
        mkdir -p initramfs/bin
        cp busybox initramfs/bin/
        cd initramfs/bin
        for cmd in $(./busybox --list); do ln -sf busybox $cmd 2>/dev/null || true; done
        cd ../..
        cat > initramfs/init << 'INIT'
#!/bin/busybox sh
mount -t proc none /proc
mount -t sysfs none /sys
mount -t devtmpfs none /dev
mknod /dev/null c 1 3 2>/dev/null || true
mknod /dev/zero c 1 5 2>/dev/null || true
mknod /dev/tty c 5 0 2>/dev/null || true
mknod /dev/console c 5 1 2>/dev/null || true
hostname FreeProMemOS
echo ""
echo "FreeProMemOS"
echo "============"
echo ""
uname -r
echo ""
exec /bin/sh
INIT
        chmod +x initramfs/init
        cd initramfs
        find . | cpio -o -H newc | gzip > ../iso/boot/initrd.img
    
    - name: Create ISO
      run: |
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        cp linux-$LINUX_VERSION/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz
        cp linux-$LINUX_VERSION/System.map iso/boot/kernel/System.map
        cat > iso/boot/grub/grub.cfg << 'GRUB'
set timeout=5
set default=0

menuentry 'FreeProMemOS' {
    linux /boot/kernel/vmlinuz root=/dev/ram0 rw
    initrd /boot/initrd.img
}
GRUB
        cd iso
        grub-mkrescue -o FreeProMemOS-$LINUX_VERSION.iso .
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO
        path: iso/*.iso
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Kernel
        path: |
          linux-$LINUX_VERSION/arch/x86/boot/bzImage
          linux-$LINUX_VERSION/System.map
          linux-$LINUX_VERSION/.config
