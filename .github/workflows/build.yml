
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"
  ARCH: "x86_64"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.version.outputs.kernel_version }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set Kernel Version
      id: version
      run: echo "kernel_version=${{ env.LINUX_VERSION }}" >> $GITHUB_OUTPUT
    
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          dwarves \
          pahole \
          zstd \
          kmod \
          cpio \
          rsync \
          wget \
          xz-utils \
          gzip \
          grub2-common \
          grub-pc-bin \
          grub-efi-amd64-bin \
          xorriso \
          parted \
          dosfstools \
          uuid-dev \
          libncurses-dev \
          libgtk2.0-dev \
          libglib2.0-dev \
          libnuma-dev
    
    - name: Create Root Filesystem
      run: |
        cd ${{ github.workspace }}
        mkdir -p rootfs/{bin,sbin,etc,home,lib,lib64,mnt,proc,root,sys,tmp,usr,var,dev}
        mkdir -p rootfs/boot/grub
        mkdir -p rootfs/usr/{bin,sbin,lib}
        
        # Create basic device nodes
        sudo mknod rootfs/dev/null c 1 3
        sudo mknod rootfs/dev/zero c 1 5
        sudo mknod rootfs/dev/random c 1 8
        sudo mknod rootfs/dev/urandom c 1 9
        
        # Create basic passwd
        cat > rootfs/etc/passwd << 'EOF'
        root:x:0:0:root:/root:/bin/bash
        daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
        bin:x:2:2:bin:/bin:/usr/sbin/nologin
        sys:x:3:3:sys:/dev:/usr/sbin/nologin
        EOF
        
        # Create basic group
        cat > rootfs/etc/group << 'EOF'
        root:x:0:
        daemon:x:1:
        bin:x:2:
        sys:x:3:
        EOF
        
        # Create hostname
        echo "freepromemos" > rootfs/etc/hostname
        
        # Create basic shell scripts
        cat > rootfs/bin/sh << 'EOF'
        #!/bin/bash
        exec /bin/bash
        EOF
        chmod +x rootfs/bin/sh
        
        ls -la rootfs/
    
    - name: Download Linux Kernel Source
      run: |
        cd ${{ github.workspace }}
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.LINUX_VERSION }}.tar.xz
        tar xf linux-${{ env.LINUX_VERSION }}.tar.xz
        ls -lh linux-${{ env.LINUX_VERSION }}
    
    - name: Configure Kernel
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        make defconfig
        make kvm_guest.config
        
        # Disable initramfs for now, we'll build it separately
        # echo 'CONFIG_INITRAMFS_SOURCE=""' >> .config
        echo 'CONFIG_BLK_DEV_INITRD=y' >> .config
        echo 'CONFIG_RD_GZIP=y' >> .config
        echo 'CONFIG_DEVTMPFS=y' >> .config
        echo 'CONFIG_DEVTMPFS_MOUNT=y' >> .config
        echo 'CONFIG_TMPFS=y' >> .config
        echo 'CONFIG_DEBUG_INFO=n' >> .config
        echo 'CONFIG_FRAME_POINTER=n' >> .config
        
        make olddefconfig
    
    - name: Build Kernel
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        make -j$(nproc) bzImage
        make -j$(nproc) modules
        make modules_install INSTALL_MOD_PATH=${{ github.workspace }}/build/modules
    
    - name: Create Initial RAM Disk
      run: |
        cd ${{ github.workspace }}
        
        # Create a simple initramfs with busybox
        mkdir -p initramfs/{bin,sbin,etc,proc,sys,dev}
        
        # Download and build busybox statically
        wget -q https://www.busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar xf busybox-1.36.1.tar.bz2
        cd busybox-1.36.1
        make defconfig
        sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
        make -j$(nproc) CONFIG_PREFIX=${{ github.workspace }}/initramfs install
        
        # Create init script
        cat > ${{ github.workspace }}/initramfs/init << 'EOF'
        #!/bin/sh
        
        # Mount filesystems
        mount -t proc none /proc
        mount -t sysfs none /sys
        mount -t devtmpfs none /dev
        
        # Set hostname
        hostname FreeProMemOS
        
        # Welcome message
        echo ""
        echo "FreeProMemOS"
        echo "============"
        echo ""
        echo "Kernel: $(uname -r)"
        echo "Arch: $(uname -m)"
        echo ""
        
        # Start shell
        echo "Starting shell..."
        exec /bin/sh
        EOF
        chmod +x ${{ github.workspace }}/initramfs/init
        
        # Pack initramfs
        cd ${{ github.workspace }}/initramfs
        find . -print0 | cpio --null --create --format='newc' | gzip > ${{ github.workspace }}/iso/boot/initrd.img
        ls -lh ${{ github.workspace }}/iso/boot/initrd.img
    
    - name: Build ISO Image
      run: |
        cd ${{ github.workspace }}
        
        # Copy kernel and initramfs to iso
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        cp linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz-${{ env.LINUX_VERSION }}
        cp linux-${{ env.LINUX_VERSION }}/System.map iso/boot/kernel/System.map-${{ env.LINUX_VERSION }}
        
        # Create GRUB configuration
        cat > iso/boot/grub/grub.cfg << EOF
        set timeout=5
        set default=0
        
        menuentry 'FreeProMemOS ${{ env.LINUX_VERSION }}' {
            linux /boot/kernel/vmlinuz-${{ env.LINUX_VERSION }} root=/dev/ram0 rw console=ttyS0 console=tty0
            initrd /boot/initrd.img
        }
        
        menuentry 'FreeProMemOS ${{ env.LINUX_VERSION }} (Safe Mode)' {
            linux /boot/kernel/vmlinuz-${{ env.LINUX_VERSION }} root=/dev/ram0 rw console=ttyS0 console=tty0 single
            initrd /boot/initrd.img
        }
        EOF
        
        # Create EFI boot image
        mkdir -p iso/EFI/BOOT
        cat > iso/EFI/BOOT/grub.cfg << EOF
        set timeout=5
        menuentry 'FreeProMemOS' {
            linux /boot/kernel/vmlinuz-${{ env.LINUX_VERSION }} root=/dev/ram0 rw
            initrd /boot/initrd.img
        }
        EOF
        
        # Build ISO using grub-mkrescue
        cd iso
        grub-mkrescue -o FreeProMemOS-${{ env.LINUX_VERSION }}.iso . 2>/dev/null || \
        xorriso -as mkisofs \
          -R \
          -b boot/grub/i386-pc/boot.img \
          -no-emul-boot \
          -boot-load-size 2048 \
          -boot-info-table \
          --efi-boot boot/EFI/BOOT/bootx64.efi \
          -eltorito-alt-boot \
          -e boot/EFI/BOOT/bootx64.efi \
          -no-emul-boot \
          -o FreeProMemOS-${{ env.LINUX_VERSION }}.iso . || \
        mkisofs -o FreeProMemOS-${{ env.LINUX_VERSION }}.iso -R -b boot/grub/i386-pc/boot.img -no-emul-boot -boot-load-size 2048 -boot-info-table .
        
        ls -lh FreeProMemOS-${{ env.LINUX_VERSION }}.iso
        file FreeProMemOS-${{ env.LINUX_VERSION }}.iso
    
    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-${{ env.LINUX_VERSION }}-x86_64
        path: iso/FreeProMemOS-${{ env.LINUX_VERSION }}.iso
    
    - name: Upload Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-kernel-${{ env.LINUX_VERSION }}
        path: |
          linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage
          linux-${{ env.LINUX_VERSION }}/System.map
          build/modules/lib/modules/${{ env.LINUX_VERSION }}

  release:
    needs: build-kernel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: FreeProMemOS-${{ env.LINUX_VERSION }}-x86_64
        path: release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.iso
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
