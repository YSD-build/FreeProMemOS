
name: Build FreeProMemOS Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  KERNEL_VERSION: "6.8.12"
  DISTRO: "ubuntu"
  CODENAME: "jammy"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VERSION: "0.1.0-Server-BETA"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          cpio \
          kmod \
          rsync \
          grub-pc-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          dosfstools \
          debootstrap \
          qemu-utils \
          ca-certificates
    
    - name: Download kernel source
      run: |
        cd "$HOME"
        wget --no-verbose --tries=3 https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
        tar xf linux-${KERNEL_VERSION}.tar.xz
        ls -la linux-${KERNEL_VERSION}
    
    - name: Configure kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make x86_64_defconfig
        make olddefconfig
    
    - name: Build kernel
      run: |
        cd "$HOME/linux-${KERNEL_VERSION}"
        make -j$(nproc) bzImage modules
        ls -lh arch/x86/boot/bzImage
    
    - name: Create Ubuntu Server base system
      run: |
        sudo mkdir -p /tmp/rootfs
        sudo debootstrap \
          --include=bash,wget,vim,coreutils,iproute2,iputils-ping,net-tools,procps,systemd,udev,util-linux,ncurses-bin,less,dpkg,apt,openssh-server,openssh-client,rsync,git,curl,htop,nano,gnupg,lsb-release,software-properties-common,apt-utils,dnsutils,tcpdump,iptables \
          --variant=minbase \
          ${CODENAME} /tmp/rootfs http://archive.ubuntu.com/ubuntu/
        
        sudo chroot /tmp/rootfs bash -c "echo 'freepromemos-server' > /etc/hostname"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.0.1 localhost' > /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "echo '127.0.1.1 freepromemos-server' >> /etc/hosts"
        sudo chroot /tmp/rootfs bash -c "useradd -m -s /bin/bash admin"
        sudo chroot /tmp/rootfs bash -c "echo 'root:freepromemos' | chpasswd"
        sudo chroot /tmp/rootfs bash -c "echo 'admin:freepromemos' | chpasswd"
        
        printf '#!/bin/bash\nset -e\nmount -t proc proc /proc\nmount -t sysfs sysfs /sys\nmount -t devtmpfs devtmpfs /dev 2>/dev/null || true\nmount -t tmpfs tmpfs /tmp 2>/dev/null || true\nclear\necho ""\necho "=========================================="\necho "  FreeProMemOS Server BETA v0.1.0"\necho "=========================================="\necho ""\necho "Linux kernel $(uname -r)"\necho "System architecture: $(uname -m)"\necho "Hostname: freepromemos-server"\necho ""\necho "Welcome to FreeProMemOS Server!"\necho ""\necho "Default accounts:"\necho "  - root: freepromemos"\necho "  - admin: freepromemos (sudo user)"\necho ""\necho "SSH Server should be available!"\necho ""\nexec /bin/bash\n' > /tmp/init.sh
        
        sudo cp /tmp/init.sh /tmp/rootfs/init
        sudo chmod +x /tmp/rootfs/init
        
        sudo rm -rf /tmp/rootfs/var/cache/apt/archives/* 2>/dev/null || true
        sudo rm -rf /tmp/rootfs/var/lib/apt/lists/* 2>/dev/null || true
        
        ls -la /tmp/rootfs/
    
    - name: Create initramfs
      run: |
        mkdir -p /tmp/initramfs
        sudo cp -a /tmp/rootfs/* /tmp/initramfs/
        
        sudo chmod 755 /tmp/initramfs
        sudo chmod 755 /tmp/initramfs/dev /tmp/initramfs/proc /tmp/initramfs/sys /tmp/initramfs/tmp 2>/dev/null || true
        
        cd /tmp/initramfs
        sudo find . -print0 | sudo cpio --null -o --format=newc | gzip -9 > /tmp/initrd.img
        
        ls -lh /tmp/
    
    - name: Create boot directory
      run: |
        mkdir -p /tmp/iso/boot/grub/i386-pc
        cp "$HOME/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage" /tmp/iso/boot/vmlinuz
        cp "$HOME/linux-${KERNEL_VERSION}/System.map" /tmp/iso/boot/System.map
        cp /tmp/initrd.img /tmp/iso/boot/initrd.img
        ls -la /tmp/iso/boot/
    
    - name: Create GRUB configuration
      run: |
        printf 'set timeout=10\nset default=0\n\nmenuentry "FreeProMemOS Server BETA v0.1.0" {\n    linux /boot/vmlinuz root=/dev/ram0 rw init=/init\n    initrd /boot/initrd.img\n}\n\nmenuentry "FreeProMemOS Server BETA v0.1.0 (Safe Mode)" {\n    linux /boot/vmlinuz root=/dev/ram0 rw init=/init single\n    initrd /boot/initrd.img\n}\n' > /tmp/iso/boot/grub/grub.cfg
        
        ls -la /tmp/iso/boot/grub/
    
    - name: Create ISO image
      run: |
        cd /tmp
        ls -la iso/
        grub-mkrescue -o FreeProMemOS-Server-BETA-${VERSION}.iso /tmp/iso
        ls -lh FreeProMemOS-Server-BETA-${VERSION}.iso
        file FreeProMemOS-Server-BETA-${VERSION}.iso
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Server-BETA-${VERSION}-ISO
        path: /tmp/FreeProMemOS-Server-BETA-${VERSION}.iso
        retention-days: 30
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Server-BETA-${VERSION}-Kernel
        path: |
          /home/runner/linux-${KERNEL_VERSION}/arch/x86/boot/bzImage
          /home/runner/linux-${KERNEL_VERSION}/System.map
          /home/runner/linux-${KERNEL_VERSION}/.config
        retention-days: 30
