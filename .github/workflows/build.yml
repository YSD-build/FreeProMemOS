
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev dwarves pahole zstd kmod cpio rsync wget xz-utils gzip bzip2 grub2-common grub-pc-bin grub-efi-amd64-bin xorriso parted dosfstools
    
    - name: Download Kernel
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.LINUX_VERSION }}.tar.xz
        tar xf linux-${{ env.LINUX_VERSION }}.tar.xz
    
    - name: Configure Kernel
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make defconfig
    
    - name: Build Kernel
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make -j$(nproc) bzImage
    
    - name: Build Modules
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make -j$(nproc) modules
    
    - name: Install Modules
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        sudo make modules_install
        sudo depmod
    
    - name: Create Initramfs
      run: |
        mkdir -p iso/boot
        wget -q https://busybox.net/downloads/binaries/1.36.1-x86_64-linux-musl/busybox
        chmod +x busybox
        mkdir -p initramfs/bin
        cp busybox initramfs/bin/
        cd initramfs/bin
        for cmd in $(./busybox --list); do ln -sf busybox $cmd 2>/dev/null || true; done
        cd ../..
        printf '#!/bin/busybox sh\nmount -t proc none /proc\nmount -t sysfs none /sys\nmount -t devtmpfs none /dev\n\nmknod /dev/null c 1 3 2>/dev/null || true\nmknod /dev/zero c 1 5 2>/dev/null || true\nmknod /dev/tty c 5 0 2>/dev/null || true\nmknod /dev/console c 5 1 2>/dev/null || true\n\nhostname FreeProMemOS\n\necho ""\necho "FreeProMemOS"\necho "============"\necho ""\nuname -r\necho ""\n\nexec /bin/sh\n' > initramfs/init
        chmod +x initramfs/init
        cd initramfs
        find . | cpio -o -H newc | gzip > ../iso/boot/initrd.img
    
    - name: Create ISO
      run: |
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        cp linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz
        cp linux-${{ env.LINUX_VERSION }}/System.map iso/boot/kernel/System.map
        printf 'set timeout=5\nset default=0\n\nmenuentry "FreeProMemOS" {\n    linux /boot/kernel/vmlinuz root=/dev/ram0 rw\n    initrd /boot/initrd.img\n}\n' > iso/boot/grub/grub.cfg
        cd iso
        grub-mkrescue -o FreeProMemOS-${{ env.LINUX_VERSION }}.iso .
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO
        path: iso/*.iso
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Kernel
        path: |
          linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage
          linux-${{ env.LINUX_VERSION }}/System.map
          linux-${{ env.LINUX_VERSION }}/.config
