
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"
  ARCH: "x86_64"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.version.outputs.kernel_version }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set Kernel Version
      id: version
      run: echo "kernel_version=${{ env.LINUX_VERSION }}" >> $GITHUB_OUTPUT
    
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          dwarves \
          pahole \
          zstd \
          kmod \
          cpio \
          rsync \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          grub2-common \
          grub-pc-bin \
          grub-efi-amd64-bin \
          xorriso \
          parted \
          dosfstools \
          uuid-dev \
          libncurses-dev \
          libgtk2.0-dev \
          libglib2.0-dev \
          libnuma-dev \
          libpci-dev \
          libffi-dev \
          libxml2-dev \
          liblzma-dev \
          lz4 \
          zlib1g-dev
    
    - name: Check System Info
      run: |
        echo "CPU cores: $(nproc)"
        echo "Memory: $(free -h)"
        echo "Disk: $(df -h)"
    
    - name: Download Linux Kernel Source
      run: |
        cd ${{ github.workspace }}
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.LINUX_VERSION }}.tar.xz
        tar xf linux-${{ env.LINUX_VERSION }}.tar.xz
        ls -lh linux-${{ env.LINUX_VERSION }}
    
    - name: Configure Kernel
