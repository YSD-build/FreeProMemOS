
name: Build FreeProMemOS
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v5
    - name: Install dependencies
      run: sudo apt update; sudo DEBIAN_FRONTEND=noninteractive apt install -y debootstrap grub-pc-bin grub-common grub2-common xorriso mtools dosfstools
    - name: Build minimal system
      run: |
        sudo mkdir -p /tmp/rootfs
        sudo debootstrap --include=bash,wget,vim,coreutils,apt,dpkg --variant=minbase jammy /tmp/rootfs http://archive.ubuntu.com/ubuntu/
    - name: Create ISO dir and copy kernel
      run: |
        sudo mkdir -p /tmp/iso/boot/grub/i386-pc
        KERNEL=$(ls -1 /boot/vmlinuz-* | head -1)
        INITRD=$(ls -1 /boot/initrd.img-* 2&gt;/dev/null | head -1)
        sudo cp $KERNEL /tmp/iso/boot/vmlinuz
        sudo cp $INITRD /tmp/iso/boot/initrd.img
    - name: Create grub config
      run: |
        echo "set timeout=10" | sudo tee /tmp/iso/boot/grub/grub.cfg
        echo "set default=0" | sudo tee -a /tmp/iso/boot/grub/grub.cfg
        echo "" | sudo tee -a /tmp/iso/boot/grub/grub.cfg
        echo 'menuentry "FreeProMemOS" {' | sudo tee -a /tmp/iso/boot/grub/grub.cfg
        echo "    linux /boot/vmlinuz boot=casper toram" | sudo tee -a /tmp/iso/boot/grub/grub.cfg
        echo "    initrd /boot/initrd.img" | sudo tee -a /tmp/iso/boot/grub/grub.cfg
        echo "}" | sudo tee -a /tmp/iso/boot/grub/grub.cfg
    - name: Build ISO
      run: |
        cd /tmp
        sudo grub-mkrescue -o FreeProMemOS.iso iso
        sudo ls -lh
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO
        path: /tmp/FreeProMemOS.iso
        retention-days: 30
