
name: Build FreeProMemOS Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VERSION: "0.1.0-Server-BETA"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          cpio \
          rsync \
          grub-pc-bin \
          grub-common \
          grub2-common \
          xorriso \
          mtools \
          dosfstools \
          debootstrap \
          ca-certificates
    
    - name: Make build script executable
      run: chmod +x build-server.sh
    
    - name: Build FreeProMemOS
      run: sudo ./build-server.sh
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Server-BETA-${{ env.VERSION }}-ISO
        path: /tmp/FreeProMemOS-Server-BETA-${{ env.VERSION }}.iso
        retention-days: 30
