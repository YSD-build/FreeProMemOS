
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update &amp;&amp; sudo apt-get install -y gcc-multilib nasm qemu-system-x86 xorriso isolinux syslinux-common
    
    - name: Build
      run: |
        make all
        ls -la
        
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-iso
        path: FreeProMemOS.iso
