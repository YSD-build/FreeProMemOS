
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev dwarves pahole zstd kmod cpio rsync wget xz-utils gzip bzip2 grub2-common grub-pc-bin grub-efi-amd64-bin xorriso parted dosfstools busybox mtools syslinux
    
    - name: Download Kernel
      run: |
        wget https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.LINUX_VERSION }}.tar.xz
        tar xf linux-${{ env.LINUX_VERSION }}.tar.xz
    
    - name: Configure Kernel
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make defconfig
    
    - name: Build Kernel
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make -j$(nproc) bzImage
    
    - name: Build Modules
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        make -j$(nproc) modules
    
    - name: Install Modules
      run: |
        cd linux-${{ env.LINUX_VERSION }}
        sudo make modules_install
        sudo depmod
    
    - name: Create Initramfs
      run: |
        mkdir -p iso/boot
        mkdir -p initramfs/bin
        mkdir -p initramfs/dev
        mkdir -p initramfs/proc
        mkdir -p initramfs/sys
        mkdir -p initramfs/sbin
        mkdir -p initramfs/usr/bin
        mkdir -p initramfs/usr/sbin
        cp /usr/bin/busybox initramfs/bin/
        cp /usr/bin/busybox initramfs/sbin/
        cp /usr/bin/busybox initramfs/usr/bin/
        cp /usr/bin/busybox initramfs/usr/sbin/
        for cmd in $(/usr/bin/busybox --list); do ln -sf /bin/busybox initramfs/bin/$cmd 2>/dev/null || true; done
        for cmd in $(/usr/bin/busybox --list); do ln -sf /sbin/busybox initramfs/sbin/$cmd 2>/dev/null || true; done
        for cmd in $(/usr/bin/busybox --list); do ln -sf /usr/bin/busybox initramfs/usr/bin/$cmd 2>/dev/null || true; done
        for cmd in $(/usr/bin/busybox --list); do ln -sf /usr/sbin/busybox initramfs/usr/sbin/$cmd 2>/dev/null || true; done
        printf '#!/bin/sh\nmount -t proc proc /proc\nmount -t sysfs sysfs /sys\nmount -t devtmpfs devtmpfs /dev\n\necho ""\necho "FreeProMemOS"\necho "============"\necho ""\necho "Kernel: $(uname -r)"\necho "Architecture: $(uname -m)"\necho ""\nexec /bin/sh\n' > initramfs/init
        chmod +x initramfs/init
        ls -la initramfs/
        ls -la initramfs/bin/
        ls -la initramfs/sbin/
        cat initramfs/init
        cd initramfs
        find . -print0 | cpio --null -o --format=newc | gzip > ../iso/boot/initrd.img
    
    - name: Create ISO
      run: |
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        cp linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz
        cp linux-${{ env.LINUX_VERSION }}/System.map iso/boot/kernel/System.map
        printf 'set timeout=5\nset default=0\n\nmenuentry "FreeProMemOS" {\n    linux /boot/kernel/vmlinuz root=/dev/ram0 rw\n    initrd /boot/initrd.img\n}\n' > iso/boot/grub/grub.cfg
        cd iso
        grub-mkrescue -o FreeProMemOS-${{ env.LINUX_VERSION }}.iso .
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-ISO
        path: iso/*.iso
    
    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-Kernel
        path: |
          linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage
          linux-${{ env.LINUX_VERSION }}/System.map
          linux-${{ env.LINUX_VERSION }}/.config
