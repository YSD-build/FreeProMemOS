
name: Build FreeProMemOS

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  LINUX_VERSION: "6.8.12"
  ARCH: "x86_64"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.version.outputs.kernel_version }}
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set Kernel Version
      id: version
      run: echo "kernel_version=${{ env.LINUX_VERSION }}" >> $GITHUB_OUTPUT
    
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          bc \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          dwarves \
          pahole \
          zstd \
          kmod \
          cpio \
          rsync \
          wget \
          xz-utils \
          gzip \
          bzip2 \
          grub2-common \
          grub-pc-bin \
          grub-efi-amd64-bin \
          xorriso \
          parted \
          dosfstools \
          uuid-dev \
          libncurses-dev \
          libgtk2.0-dev \
          libglib2.0-dev \
          libnuma-dev \
          libpci-dev \
          libffi-dev \
          libxml2-dev \
          liblzma-dev \
          lz4 \
          zlib1g-dev
    
    - name: Check System Info
      run: |
        echo "CPU cores: $(nproc)"
        echo "Memory: $(free -h)"
        echo "Disk: $(df -h)"
    
    - name: Download Linux Kernel Source
      run: |
        cd ${{ github.workspace }}
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${{ env.LINUX_VERSION }}.tar.xz
        tar xf linux-${{ env.LINUX_VERSION }}.tar.xz
        ls -lh linux-${{ env.LINUX_VERSION }}
    
    - name: Configure Kernel
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        make defconfig
        
        # Write minimal kernel config
        cat > .config << 'KERNELCONFIG'
CONFIG_64BIT=y
CONFIG_X86_64=y
CONFIG_X86=y
CONFIG_INDIRECT_THUNK=y
CONFIG_FTRACE=y
CONFIG_KVM_GUEST=y
CONFIG_VIRTIO_BLK=y
CONFIG_VIRTIO_NET=y
CONFIG_NET=y
CONFIG_PACKET=y
CONFIG_UNIX=y
CONFIG_INET=y
CONFIG_IPV6=y
CONFIG_BLK_DEV_INITRD=y
CONFIG_RD_GZIP=y
CONFIG_RD_BZIP2=y
CONFIG_RD_LZMA=y
CONFIG_RD_XZ=y
CONFIG_RD_LZO=y
CONFIG_RD_LZ4=y
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_TMPFS_XATTR=y
CONFIG_PROC_FS=y
CONFIG_SYSFS=y
CONFIG_DEBUG_INFO=n
CONFIG_FRAME_POINTER=n
CONFIG_WERROR=n
CONFIG_MODULES=y
CONFIG_MODULE_UNLOAD=y
CONFIG_MODVERSIONS=n
CONFIG_BINFMT_ELF=y
CONFIG_BINFMT_SCRIPT=y
CONFIG_FAT_FS=y
CONFIG_MSDOS_FS=y
CONFIG_VFAT_FS=y
CONFIG_EXT2_FS=y
CONFIG_EXT3_FS=y
CONFIG_EXT4_FS=y
CONFIG_SLAB=y
CONFIG_SLUB=y
CONFIG_SLOB=y
CONFIG_GENERIC_CPU=y
CONFIG_X86_GENERIC=y
CONFIG_X86_TSC=y
CONFIG_X86_MCE=y
CONFIG_X86_MCE_INTEL=y
CONFIG_X86_MCE_AMD=y
CONFIG_X86_MTRR=y
CONFIG_X86_PAT=y
CONFIG_X86_CPUID=y
CONFIG_X86_INTEL_PSTATE=y
CONFIG_ACPI=y
CONFIG_ACPI_PROCFS=y
CONFIG_ACPI_SLEEP=y
CONFIG_PCI=y
CONFIG_PCI_DOMAINS=y
CONFIG_PCIEPORTBUS=y
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_VIRTIO_CONSOLE=y
CONFIG_VGA_CONSOLE=y
CONFIG_NETDEVICES=y
CONFIG_VIRTIO_NET=y
CONFIG_E1000=y
CONFIG_E1000E=y
CONFIG_R8169=y
CONFIG_NLS=y
CONFIG_NLS_DEFAULT="utf8"
CONFIG_NLS_ASCII=y
CONFIG_NLS_ISO8859_1=y
CONFIG_NLS_UTF8=y
CONFIG_BLK_DEV_LOOP=y
CONFIG_BLK_DEV_RAM=y
CONFIG_BLK_DEV_RAM_SIZE=4096
CONFIG_PARTITION_ADVANCED=y
CONFIG_EFI=y
CONFIG_EFI_STUB=y
CONFIG_CRYPTO=y
CONFIG_CRYPTO_AES=y
CONFIG_CRYPTO_SHA256=y
CONFIG_CRYPTO_SHA512=y
CONFIG_HARDENED_USERCOPY=y
CONFIG_PAGE_POISONING=y
CONFIG_RANDOMIZE_BASE=y
CONFIG_RELOCATABLE=y
CONFIG_SYSVIPC=y
CONFIG_POSIX_MQUEUE=y
CONFIG_FUTEX=y
CONFIG_ANON_INODES=y
CONFIG_SIGNALFD=y
CONFIG_TIMERFD=y
CONFIG_EVENTFD=y
CONFIG_EPOLL=y
CONFIG_AIO=y
CONFIG_IO_URING=y
CONFIG_MEMBARRIER=y
CONFIG_KEXEC_FILE=y
CONFIG_HAVE_KERNEL_GZIP=y
CONFIG_KERNEL_GZIP=y
CONFIG_HAVE_ARCH_JUMP_LABEL=y
CONFIG_JUMP_LABEL=y
CONFIG_PRINTK_TIME=y
CONFIG_USE_GENERIC_SMP_HELPERS=y
CONFIG_GENERIC_SMP_IDLE_THREAD=y
CONFIG_HAVE_LATENCYTOP_SUPPORT=y
CONFIG_FTRACE_MCOUNT_RECORD=y
CONFIG_HAVE_DYNAMIC_FTRACE=y
CONFIG_HAVE_FTRACE_MCOUNT_RECORD=y
CONFIG_HAVE_SYSCALL_TRACEPOINTS=y
CONFIG_HAVE_PERF_EVENTS=y
CONFIG_HAVE_REGS_AND_STACK_ACCESS_API=y
CONFIG_HAVE_SMP=y
CONFIG_HAVE_SYSCALL_WRAPPERS=y
CONFIG_COMPAT_BRK=n
CONFIG_DEFAULT_MMAP_MIN_ADDR=4096
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_TMPFS_XATTR=y
CONFIG_DEVTMPFS_MOUNT=y
KERNELCONFIG
    
    - name: Build Kernel
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        echo "Starting kernel build..."
        make bzImage -j$(nproc)
    
    - name: Build Kernel Modules
      run: |
        cd ${{ github.workspace }}/linux-${{ env.LINUX_VERSION }}
        echo "Building modules..."
        make modules -j$(nproc)
        make modules_install INSTALL_MOD_PATH=${{ github.workspace }}/build/modules
    
    - name: Create Initial RAM Disk
      run: |
        cd ${{ github.workspace }}
        mkdir -p iso/boot
        mkdir -p initramfs/{bin,sbin,etc,proc,sys,dev,root,tmp}
        
        # Download pre-built busybox
        wget -q https://busybox.net/downloads/binaries/1.36.1-x86_64-linux-musl/busybox
        cp busybox initramfs/bin/
        chmod +x initramfs/bin/busybox
        
        # Create symlinks
        cd initramfs/bin
        for cmd in $(./busybox --list); do
            ln -sf busybox $cmd 2>/dev/null || true
        done
        cd ${{ github.workspace }}
        
        # Create init script
        cat > initramfs/init << 'INITRAMFSINIT'
#!/bin/busybox sh

mount -t proc none /proc
mount -t sysfs none /sys
mount -t devtmpfs none /dev

mknod /dev/null c 1 3 2>/dev/null || true
mknod /dev/zero c 1 5 2>/dev/null || true
mknod /dev/tty c 5 0 2>/dev/null || true
mknod /dev/console c 5 1 2>/dev/null || true

hostname FreeProMemOS

echo ""
echo "FreeProMemOS"
echo "============"
echo ""
echo "Kernel: $(uname -r)"
echo "Architecture: $(uname -m)"
echo ""
echo "Welcome to FreeProMemOS - A lightweight, Debian-compatible Linux distribution"
echo ""

exec /bin/sh
INITRAMFSINIT
        chmod +x initramfs/init
        
        # Pack initramfs
        cd initramfs
        find . | cpio -o -H newc | gzip > ${{ github.workspace }}/iso/boot/initrd.img
        ls -lh ${{ github.workspace }}/iso/boot/initrd.img
    
    - name: Build ISO Image
      run: |
        cd ${{ github.workspace }}
        
        mkdir -p iso/boot/grub
        mkdir -p iso/boot/kernel
        
        cp linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage iso/boot/kernel/vmlinuz
        cp linux-${{ env.LINUX_VERSION }}/System.map iso/boot/kernel/System.map
        
        cat > iso/boot/grub/grub.cfg << 'GRUBCFG'
set timeout=5
set default=0

menuentry 'FreeProMemOS' {
    linux /boot/kernel/vmlinuz root=/dev/ram0 rw console=ttyS0 console=tty0
    initrd /boot/initrd.img
}

menuentry 'FreeProMemOS (Safe Mode)' {
    linux /boot/kernel/vmlinuz root=/dev/ram0 rw console=ttyS0 console=tty0 single
    initrd /boot/initrd.img
}
GRUBCFG
        
        cd iso
        grub-mkrescue -o FreeProMemOS.iso .
        ls -lh FreeProMemOS.iso
    
    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeProMemOS-x86_64
        path: iso/FreeProMemOS.iso
    
    - name: Upload Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-kernel-${{ env.LINUX_VERSION }}
        path: |
          linux-${{ env.LINUX_VERSION }}/arch/x86/boot/bzImage
          linux-${{ env.LINUX_VERSION }}/System.map

  release:
    needs: build-kernel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    
    steps:
    - name: Download ISO
      uses: actions/download-artifact@v4
      with:
        name: FreeProMemOS-x86_64
        path: release/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*.iso
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
